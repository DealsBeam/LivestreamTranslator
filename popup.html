<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LiveStream Translator</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">🌐</div>
    <div>
      <h1>LiveStream Translator</h1>
      <p class="sub">Japanese → English · Free & Open Source</p>
    </div>
  </div>

  <!-- API Key -->
  <div class="section">
    <label for="apiKey">Gemini API Key</label>
    <div class="input-row">
      <input type="password" id="apiKey" placeholder="Paste your free API key..." autocomplete="off" spellcheck="false" />
      <button id="toggleKey" class="icon-btn" title="Show/hide">👁</button>
    </div>
    <div class="key-footer">
      <span id="keyStatus" class="key-status"></span>
      <a href="https://aistudio.google.com/apikey" target="_blank" class="link">Get free key →</a>
    </div>
  </div>

  <!-- Start/Stop -->
  <div class="section center">
    <button id="toggleCapture" class="btn btn-start">▶&nbsp; Start Translation</button>
    <div id="badge" class="badge badge-off">● Inactive</div>
  </div>

  <hr />

  <!-- Settings -->
  <div class="section">
    <p class="section-label">Caption Settings</p>

    <div class="row">
      <span class="row-label">Font size</span>
      <input type="range" id="fontSize" min="12" max="36" value="18" />
      <span class="row-val" id="fontSizeVal">18px</span>
    </div>

    <div class="row">
      <span class="row-label">Background</span>
      <input type="range" id="opacity" min="0.3" max="1" step="0.05" value="0.84" />
      <span class="row-val" id="opacityVal">84%</span>
    </div>

    <div class="row">
      <span class="row-label">Position</span>
      <select id="position">
        <option value="bottom">Bottom</option>
        <option value="top">Top</option>
      </select>
    </div>

    <div class="row toggle-row">
      <span class="row-label">Bilingual</span>
      <label class="toggle">
        <input type="checkbox" id="bilingual" checked />
        <span class="slider"></span>
      </label>
      <span class="row-val" id="bilingualVal">On</span>
    </div>
    <p class="hint">Show Japanese original below English caption</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://github.com/yourusername/livestream-translator" target="_blank">⭐ GitHub</a>
    <span class="ver">v1.0.0 · Chrome</span>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
